apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-service
  namespace: sentinelx
  labels:
    app: telemetry
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telemetry
  template:
    metadata:
      labels:
        app: telemetry
        component: backend
    spec:
      containers:
        - name: telemetry
          image: ghcr.io/aakash02a/sentinelx/telemetry:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sentinelx-db-secret
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: sentinelx-redis-secret
                  key: url
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinelx-app-secret
                  key: secret-key
            - name: APP_ENV
              value: production
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-service
  namespace: sentinelx
spec:
  selector:
    app: telemetry
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
