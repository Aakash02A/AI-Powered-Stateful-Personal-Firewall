title: Suspicious PowerShell Encoded Command
id: 7f6d5c4a-3b2e-4f1d-8a9c-2e3f4b5c6d7e
status: stable
description: >
  Detects PowerShell execution with Base64-encoded command (-EncodedCommand or -enc),
  commonly used by attackers to obfuscate malicious payloads.
author: SentinelX Detection Team
date: 2024-01-01
level: high
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    process.name:
      - powershell.exe
      - pwsh.exe
    process.command_line|contains:
      - -EncodedCommand
      - -enc
      - -e
      - encodedcommand
  condition: selection
falsepositives:
  - Legitimate administrative scripts using encoded commands
  - Configuration management tools (SCCM, Ansible)
