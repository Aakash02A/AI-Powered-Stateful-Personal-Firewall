title: Ransomware File Extension Pattern
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: >
  Detects bulk file rename/create operations with extensions commonly associated
  with ransomware encryption (.locked, .encrypted, .crypt, .zepto, .cerber, etc.)
author: SentinelX Detection Team
date: 2024-01-01
level: critical
tags:
  - attack.impact
  - attack.t1486
logsource:
  category: file_event
  product: windows
detection:
  selection:
    event.type:
      - file_create
      - file_rename
    file.extension:
      - .locked
      - .encrypted
      - .crypt
      - .zepto
      - .cerber
      - .locky
      - .wnry
      - .wncry
      - .wcry
      - .cryptolocker
      - .vault
      - .zzzzz
  condition: selection
falsepositives:
  - Encryption software creating legitimate encrypted archives
