name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Lint with Flake8
      run: |
        flake8 firewall api analytics scripts tests
        
    - name: Run Tests with Coverage
      run: |
        pytest tests/ --cov=firewall --cov=api --cov-report=xml
        
    - name: Security Scan (Bandit)
      run: |
        bandit -r firewall/ api/
        
    - name: Dependency Audit (pip-audit)
      run: |
        pip-audit -r requirements.txt
        
    - name: Generate SBOM (CycloneDX)
      run: |
        cyclonedx-py requirements requirements.txt -o sbom.json
        
    - name: Upload SBOM
      uses: actions/upload-artifact@v7
      with:
        name: sbom
        path: sbom.json

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Image
      run: docker build -t ai-firewall-test .
