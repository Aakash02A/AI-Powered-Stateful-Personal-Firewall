version: '3.8'

services:
  firewall:
    build: .
    container_name: ai-firewall
    cap_add:
      - NET_ADMIN  # Required for packet capture
    ports:
      - "8000:8000"
    volumes:
      - ./config/rules.json:/app/config/rules.json
      - firewall-data:/app/data  # Persist SQLite database and logs
    environment:
      - LOG_LEVEL=INFO
      - API_KEY=${FIREWALL_API_KEY:-changeme}
    restart: unless-stopped
    networks:
      - firewall-net

  # Optional: Prometheus for metrics (uncomment if needed later)
  # prometheus:
  #   image: prom/prometheus:latest
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
  #   networks:
  #     - firewall-net

volumes:
  firewall-data:

networks:
  firewall-net:
    driver: bridge
