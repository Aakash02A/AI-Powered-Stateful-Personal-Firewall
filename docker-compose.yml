version: "3.9"

# ============================================================
# SentinelX AI-SOC — Local Development Stack
# Usage: make dev
# ============================================================

x-backend-common: &backend-common
  build:
    context: .
  environment:
    - DATABASE_URL=mysql+asyncmy://sentinelx:sentinelx_secret@mysql:3306/sentinelx
    - REDIS_URL=redis://:${REDIS_PASSWORD:-change-me-redis-password}@redis:6379/0
    - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    - OPENSEARCH_HOST=opensearch
    - OPENSEARCH_PORT=9200
    - SECRET_KEY=dev-secret-key-minimum-32-characters-long
    - APP_ENV=development
    - DEBUG=true
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - sentinelx

services:

  # ── Infrastructure ─────────────────────────────────────────

  mysql:
    image: mysql:8.3
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: sentinelx
      MYSQL_USER: sentinelx
      MYSQL_PASSWORD: sentinelx_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sentinelx", "-psentinelx_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sentinelx

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change-me-redis-password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change-me-redis-password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sentinelx

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - sentinelx

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - sentinelx

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin@12345!
      - plugins.security.ssl.http.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - sentinelx

  # ── Backend Services ──────────────────────────────────────

  auth:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/services/auth/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+asyncmy://sentinelx:sentinelx_secret@mysql:3306/sentinelx
      - REDIS_URL=redis://:${REDIS_PASSWORD:-change-me-redis-password}@redis:6379/0
      - SECRET_KEY=dev-secret-key-minimum-32-characters-long
      - APP_ENV=development
      - DEBUG=true

  telemetry:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/services/telemetry/Dockerfile
    ports:
      - "8001:8000"

  rule-engine:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/services/rule-engine/Dockerfile
    ports:
      - "8002:8000"

  ml-engine:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/services/ml-engine/Dockerfile
    ports:
      - "8003:8000"

  threat-intel:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/services/threat-intel/Dockerfile
    ports:
      - "8004:8000"

  alert-engine:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/services/alert-engine/Dockerfile
    ports:
      - "8005:8000"

  response-engine:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/services/response-engine/Dockerfile
    ports:
      - "8006:8000"

  ai-analyst:
    <<: *backend-common
    build:
      context: .
      dockerfile: backend/services/ai-analyst/Dockerfile
    ports:
      - "8007:8000"
    environment:
      - DATABASE_URL=mysql+asyncmy://sentinelx:sentinelx_secret@mysql:3306/sentinelx
      - REDIS_URL=redis://:${REDIS_PASSWORD:-change-me-redis-password}@redis:6379/0
      - SECRET_KEY=dev-secret-key-minimum-32-characters-long
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - APP_ENV=development
      - DEBUG=true

  # ── API Gateway (NGINX) ───────────────────────────────────

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - telemetry
      - alert-engine
    networks:
      - sentinelx

  # ── Frontend ──────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
      - NEXTAUTH_SECRET=dev-nextauth-secret
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - gateway
    networks:
      - sentinelx

  # ── Observability ─────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - sentinelx

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - sentinelx

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=sentinelx
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - sentinelx

volumes:
  mysql_data:
  redis_data:
  opensearch_data:
  grafana_data:

networks:
  sentinelx:
    driver: bridge
