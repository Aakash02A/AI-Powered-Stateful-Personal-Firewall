version: '3.8'

services:
  firewall:
    build: .
    container_name: ai-firewall-backend
    cap_add:
      - NET_ADMIN
    ports:
      - "8000:8000"
    volumes:
      - ./config/rules.json:/app/config/rules.json
      - firewall-data:/app/data
    environment:
      - LOG_LEVEL=INFO
      - API_KEY=${FIREWALL_API_KEY:-changeme}
    restart: unless-stopped
    networks:
      - firewall-net

  frontend:
    build: ./frontend
    container_name: ai-firewall-frontend
    ports:
      - "80:80"
    depends_on:
      - firewall
    restart: unless-stopped
    networks:
      - firewall-net

volumes:
  firewall-data:

networks:
  firewall-net:
    driver: bridge
